<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>View pdf</title>
        <script type ="module" src="{{ url_for('static', filename='view.js') }}"></script>
    </head>
    <body>
        <h1 style="text-align:center;">Pdf Viewer</h1>
        <button id="NextLine">Next Line</button>
        <button id="prevLine">Previous Line</button>
        <button id="nextPage">Next Page</button>
        <button id="prevPage">Previous Page</button>
        <button id="togglePdf">Show/Hide PDF</button>
        <button id="stepIn">Step In</button>
        <button id="stepOut">Step Out</button>
        <div>
        <canvas id="pdf" style="position:absolute; right: 100px;border: 1px solid black; direction:ltr"></canvas>
        </div>
        <div id="textDiv" style="overflow:auto; width: 500px; height:100%; left: 300px; border: 1px solid">
        </div>
    </body>
</html>
